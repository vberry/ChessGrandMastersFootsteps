<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu d'Échecs</title>
    

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #board {
            width: 400px;
            margin: 20px 0;
        }
        .game-info {
            margin: 20px 0;
            text-align: center;
        }
        .move-input {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #dff0d8;
            color: #3c763d;
            border: 1px solid #d6e9c6;
        }
        .error {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
        }
        /* Styles pour l'historique des coups */
        #move-history {
            width: 250px;
            height: 400px;
            position: fixed;
            right: 20px;
            top: 20px;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-header {
            padding: 10px;
            background-color: #e0e0e0;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            text-align: center;
        }

        .history-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-content > div {
            background-color: white;
            border-radius: 6px;
            padding: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .history-content .comment {
            color: #666;
            font-style: italic;
            margin-top: 4px;
            font-size: 0.9em;
        }

        /* Style scrollbar pour WebKit (Chrome, Safari, etc.) */
        .history-content::-webkit-scrollbar {
            width: 8px;
        }

        .history-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .history-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .history-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

    </style>
</head>
<body>
    <h1>Jeu de Devinettes d'Échecs</h1>
    
    <div class="game-info">
        <h2>Score: <span id="score">{{ game_state['score'] }}</span> / {{ game_state['total_moves'] }}</h2>
        <p id="status">C'est à vous de jouer !</p>
    </div>

    <div id="board"></div>

    <!-- Modification de la structure HTML de l'historique -->
    <div id="move-history">
        <div class="history-header">Historique des coups</div>
        <div class="history-content"></div>
    </div>


    <div class="move-input">
        <input type="text" id="move-input" placeholder="Entrez votre coup (ex: e4 ou Nf3)">
        <button id="submit-btn" onclick="submitMove()">Soumettre</button>
    </div>

    <div id="message" class="message" style="display: none;"></div>

    <script>
        let board = null;
        
        function updateMoveHistory(playerMove, correctMove, opponentMove, comment, opponentComment) {
            const moveHistory = document.querySelector('#move-history .history-content');
            const moveEntry = document.createElement('div');
            
            let moveContent = `<div><em>Vous:</em> <strong>${playerMove}</strong>`;
            if (playerMove !== correctMove) {
                moveContent += ` (correct: ${correctMove})`;
            }
            if (comment) {
                moveContent += `<div class="comment">${comment}</div>`;
            }
            moveContent += '</div>';
            
            if (opponentMove) {
                moveContent += `<div><em>Adversaire:</em> <strong>${opponentMove}</strong>`;
                if (opponentComment) {
                    moveContent += `<div class="comment">${opponentComment}</div>`;
                }
                moveContent += '</div>';
            }

            moveEntry.innerHTML = moveContent;
            moveHistory.appendChild(moveEntry);
            moveHistory.scrollTop = moveHistory.scrollHeight;
        }



        function initializeBoard() {
            console.log('Initialisation du plateau...');
            board = Chessboard('board', {
                position: '{{ game_state["board_fen"] }}',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                showNotation: true,
                draggable: false
            });

            // Redimensionner l'échiquier quand la fenêtre change de taille
            window.addEventListener('resize', board.resize);
        }

        // Vérifier si jQuery est chargé
        function checkJQuery() {
            if (window.jQuery) {
                // Vérifier si Chessboard est chargé
                if (window.Chessboard) {
                    initializeBoard();
                } else {
                    console.log('En attente de Chessboard.js...');
                    setTimeout(checkJQuery, 100);
                }
            } else {
                console.log('En attente de jQuery...');
                setTimeout(checkJQuery, 100);
            }
        }

        // Démarrer la vérification quand le DOM est chargé
        document.addEventListener('DOMContentLoaded', checkJQuery);

        function showMessage(text, isSuccess) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        function initializeBoard() {
            console.log('Initialisation du plateau...');
            board = Chessboard('board', {
                position: '{{ game_state["board_fen"] }}',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                showNotation: true,
                draggable: false,
                orientation: '{{ game_state["user_side"] }}'
            });

            // Redimensionner l'échiquier quand la fenêtre change de taille
            window.addEventListener('resize', board.resize);
        }

        function submitMove() {
            var moveInput = document.getElementById("move-input");
            var submitBtn = document.getElementById("submit-btn");
            var move = moveInput.value.trim();
            
            if (!move) {
                showMessage("Veuillez entrer un coup", false);
                return;
            }

            submitBtn.disabled = true;

            var formData = new FormData();
            formData.append("game_id", "{{ game_id }}");
            formData.append("move", move);

            fetch('/submit-move', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erreur réseau');
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    showMessage(data.error, false);
                    return;
                }

                if (board) {
                    board.position(data.board_fen);
                }

                document.getElementById("score").textContent = data.score;

                // Met à jour l'historique avec le coup du joueur, celui de l'adversaire et les commentaires
                updateMoveHistory(
                    move, 
                    data.correct_move, 
                    data.opponent_move,
                    data.comment,
                    data.opponent_comment
                );

                showMessage(
                    data.is_correct ? 
                    "✅ Bravo ! Coup correct." : 
                    "❌ Incorrect. Le bon coup était : " + data.correct_move,
                    data.is_correct
                );

                moveInput.value = '';

                if (data.game_over) {
                    document.getElementById("status").textContent = "🎉 Partie terminée !";
                    submitBtn.disabled = true;
                    moveInput.disabled = true;
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                showMessage("Une erreur est survenue", false);
            })
            .finally(() => {
                if (!document.getElementById("status").textContent.includes("terminée")) {
                    submitBtn.disabled = false;
                }
            });
        }

        document.getElementById("move-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitMove();
            }
        });
    </script>
</body>
</html>
